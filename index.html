  const firebaseConfig = {
    apiKey: "AIzaSyDUtKVYWMEoO7nuI2WMs_hEOnX_OTrus7g",
    authDomain: "chat-onli-ee17e.firebaseapp.com",
    databaseURL: "https://chat-onli-ee17e-default-rtdb.firebaseio.com",

    appId: "1:182377881896:web:9f46d5b46ce1a0a800701d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 总访问
  const totalRef = db.ref('visits');

  // 今日访问（按日期键）
  const todayKey = new Date().toISOString().slice(0,10); // YYYY-MM-DD
  const todayRef = db.ref('daily/' + todayKey);

  // 初始化
  totalRef.once('value', (s)=>{ if (s.val()===null) totalRef.set(0); });
  todayRef.once('value', (s)=>{ if (s.val()===null) todayRef.set(0); });

  // 进入页面时 +1
  totalRef.transaction(c => (c||0)+1);
  todayRef.transaction(c => (c||0)+1);

  // 显示总访问
  totalRef.on('value', (s)=>{
    const v = s.val() || 0;
    document.getElementById('busuanzi_value_site_uv').innerText = v;
  });

  // 显示今日访问
  todayRef.on('value', (s)=>{
    const v = s.val() || 0;
    const el = document.getElementById('today-count');
    if (el) el.innerText = v;
  });
</script></head>
